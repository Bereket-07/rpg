version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "3006:3000"
    env_file:
      - ./backend/.env          # shares GOOGLE_*, GEMINI_API_KEY, AUTHORIZED_EMAILS, etc.
    environment:
      # These override / extend anything from env_file above
      - NEXT_PUBLIC_API_URL=http://164.92.127.224/api/v1
      - API_INTERNAL_URL=http://backend:8000
      - NEXTAUTH_SECRET=super_secret_dev_key_change_in_production_12345
      - NEXTAUTH_URL=http://164.92.127.224
    depends_on:
      - backend
    networks:
      - rpg_prod_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "8006:8000"
    volumes:
      # Map the upload directory so user images persist across container restarts
      - backend_uploads:/app/static/uploads
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:1234@db:5432/rpg_db
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rpg_prod_network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=rpg_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpg_prod_network

volumes:
  postgres_prod_data:
  backend_uploads:

networks:
  rpg_prod_network:
    driver: bridge
